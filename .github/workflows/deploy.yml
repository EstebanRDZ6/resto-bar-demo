name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Por si tu rama principal se llama master

# Configuración de permisos necesarios para que GitHub Actions pueda publicar 
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo una implementación concurrente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Puedes especificar una versión si es necesario
          # flutter-version: '3.x.x' 

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web app
        # Es fundamental que el base-href coincida con el nombre de tu repositorio de GitHub. 
        # Esta variable de entorno lo asigna automáticamente.
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
